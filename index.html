<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Next.js Full Tutorial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ededed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 0.5rem;
    }

    .logo span { color: #fff; }
    .logo .dot { color: #0070f3; }

    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 3rem;
    }

    .tutorials {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 560px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: #0070f3;
      background: #0d1a2d;
    }

    .num {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0070f3;
      min-width: 2rem;
    }

    .info { flex: 1; }

    .title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .desc {
      font-size: 0.82rem;
      color: #666;
    }

    .arrow {
      color: #444;
      font-size: 1.2rem;
    }

    .card:hover .arrow { color: #0070f3; }

    footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="logo"><span>Next</span><span class="dot">.</span><span>js</span></div>
  <p class="subtitle">Full Tutorial Series</p>

  <div class="tutorials">

    <a class="card" href="tutorial-01-what-is-nextjs.html">
      <span class="num">01</span>
      <div class="info">
        <div class="title">What is Next.js?</div>
        <div class="desc">Introduction, features, and why use Next.js</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="tutorial-02-installing-nextjs.html">
      <span class="num">02</span>
      <div class="info">
        <div class="title">Installing Next.js</div>
        <div class="desc">Setup, project structure, and first run</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="tutorial-03-pages-routing-dynamic-routes.html">
      <span class="num">03</span>
      <div class="info">
        <div class="title">Pages, Routing & Dynamic Routes</div>
        <div class="desc">App Router, nested routes, dynamic segments</div>
      </div>
      <span class="arrow">→</span>
    </a>

  </div>

  <footer>More tutorials coming soon</footer>

</body>
